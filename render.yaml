services:
  - type: web
    name: relaxify-server
    runtime: node
    buildCommand: npm install && pip install -U yt-dlp && python3 -m yt_dlp --version
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: YOUTUBE_COOKIES
        sync: false
