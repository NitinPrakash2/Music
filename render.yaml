services:
  - type: web
    name: relaxify-server
    runtime: node
    rootDir: server
    buildCommand: npm install && pip3 install -U yt-dlp
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
